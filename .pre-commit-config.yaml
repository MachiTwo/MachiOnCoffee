default_language_version:
  python: python3

exclude: |
  (?x)^(
    static/.*|
    .*\.pdf$|
    temp/.*|
    .*/temp/.*|
    .*\.json$|
    .*\.html$
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-vet
      - id: go-mod-tidy

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.2
    hooks:
      - id: golangci-lint

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: \.py$
        types_or: [text]
        additional_dependencies: [types-PyYAML]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: text-unicode-replacement-char
        exclude: (?x)^(.*\.md*)$

  - repo: local
    hooks:
      - id: generate-frontmatter
        name: Generate Frontmatter
        entry: python scripts/generate_frontmatter.py
        language: system
        files: ^docs/.*\.md$
        pass_filenames: true
      - id: generate-external-links
        name: Generate External Links
        entry: python scripts/generate_links.py
        language: system
        files: ^docs/.*\.md$
        pass_filenames: true
      - id: generate-footer
        name: Generate Footer
        entry: python scripts/generate_footer.py
        language: system
        files: ^docs/.*\.md$
        pass_filenames: true
      - id: generate-index
        name: Generate Index
        entry: python scripts/generate_index.py
        language: system
        pass_filenames: false
      - id: xml-to-json
        name: XML to JSON Documentation Generator
        entry: python scripts/xml_to_json.py
        language: system
        files: \.xml$
        pass_filenames: false
      - id: generate-sitemap
        name: Generate Sitemap
        entry: python scripts/generate_sitemap.py
        language: system
        files: \.md$
        pass_filenames: false
      - id: fix-code-blocks
        name: Fix Markdown Code Blocks
        entry: python scripts/fix_code_blocks.py
        language: system
        files: \.md$
        pass_filenames: true
      - id: remove-emojis
        name: Remove Decorative Emojis
        entry: python scripts/remove_emojis.py
        language: system
        files: \.md$
        pass_filenames: true
      - id: vscode-lint
        name: VS Code Extension Lint
        entry: powershell.exe -Command "cd extensions/vscode; npm run lint"
        language: system
        files: ^extensions/vscode/.*
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json", "--fix"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        args: ["--write"]
        files: \.(md|yaml|yml|css)$
        types_or: [text]
        verbose: true
