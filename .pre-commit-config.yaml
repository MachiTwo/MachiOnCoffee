default_language_version:
  python: python3

exclude: |
  (?x)^(
    static/.*|
    .*\.pdf$|
    temp/.*|
    .*/temp/.*|
    .*\.json$|
    .*\.html$
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: \.py$
        types_or: [text]
        additional_dependencies: [types-PyYAML]

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: text-unicode-replacement-char
        exclude: (?x)^(.*\.md*)$

  - repo: local
    hooks:
      - id: generate-index
        name: Generate Index
        entry: python generate_index.py
        language: system
        pass_filenames: false
      - id: xml-to-json
        name: XML to JSON Documentation Generator
        entry: python scripts/xml_to_json.py
        language: system
        files: \.xml$
        pass_filenames: false
      - id: generate-sitemap
        name: Generate Sitemap
        entry: python scripts/generate_sitemap.py
        language: system
        files: \.md$
        pass_filenames: false
      - id: remove-emojis
        name: Remove Decorative Emojis
        entry: python scripts/remove_emojis.py
        language: system
        files: \.md$
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json", "--fix"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        args: ["--write"]
        files: \.(md|yaml|yml|css)$
        types_or: [text]
        verbose: true
